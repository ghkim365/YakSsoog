<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>

<title>약쏙옥 - 알람 설정</title>

            background-color: #ffffff;

            box-shadow: 0 8px 30px rgba(147, 75, 0, 0.05);
        }
    </style>

                      "on-surface": "#1b1c19",

                      "surface": "#fbf9f4",
                      "tertiary-fixed-dim": "#81d7b2",
                      "on-tertiary": "#ffffff",
                      "on-secondary-fixed": "#001d33",
                      "on-primary": "#ffffff",
                      "inverse-surface": "#30312e",

                      "on-secondary-fixed-variant": "#194a70",
                      "error-container": "#ffdad6",
                      "on-tertiary-container": "#004833",
                      "on-primary-fixed": "#301400",
                      "surface-bright": "#fbf9f4",
                      "secondary": "#356289",
                      "primary-fixed-dim": "#ffb781",
                      "on-primary-fixed-variant": "#703800",
                      "surface-container-high": "#eae8e3",
                      "secondary-container": "#a5d0fe",
                      "on-error-container": "#93000a",
                      "surface-tint": "#934b00",
                      "surface-dim": "#dbdad5",
                      "surface-variant": "#e4e2dd",
                      "surface-container-highest": "#e4e2dd",
                      "on-error": "#ffffff",
                      "tertiary": "#006c4e",

                      "primary-fixed": "#ffdcc5",
                      "primary-container": "#f39241",
                      "on-secondary-container": "#2c5981",
                      "on-background": "#1b1c19",
                      "tertiary-container": "#64ba97",
                      "error": "#ba1a1a",
                      "secondary-fixed": "#cfe5ff",
                      "secondary-fixed-dim": "#a0cbf8",
                      "inverse-primary": "#ffb781",
                      "primary": "#934b00",
                      "on-tertiary-fixed-variant": "#00513a"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",

              },
              "spacing": {
                      "stack-gap": "1rem",

                      "section-gap": "2.5rem",

              "fontFamily": {

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-surface border-b border-outline-variant/30 shadow-sm fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile h-touch-target-min">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-lg bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
</div>
<h1 class="font-headline-md text-headline-md-mobile text-primary font-bold">약쏙옥</h1>
</div>
<div class="text-on-surface-variant font-label-lg">10월 24일 (목)</div>
</header>
<main class="pt-20 px-margin-mobile max-w-md mx-auto">
<!-- Section Header -->
<div class="py-6">
<h2 class="font-headline-lg text-headline-lg-mobile text-on-surface mb-2">복약 알림 설정</h2>
<p class="text-on-surface-variant font-body-md">놓치지 않도록 소리와 시간을 확인해주세요.</p>
</div>
<!-- Alarm List -->
<div class="flex flex-col gap-gutter">
<!-- Alarm Card 1 (Active) -->
<div class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-6 alarm-card-glow transition-all active:scale-[0.98]">
<div class="flex justify-between items-start mb-6">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">pill</span>
<span class="font-label-xl text-on-surface">혈압약 (아모디핀)</span>
</div>
<div class="font-headline-xl text-headline-xl text-primary tracking-tight">08:00 <span class="text-headline-md font-medium">AM</span></div>
</div>
<button class="w-14 h-8 bg-primary rounded-full relative p-1 transition-colors duration-300" onclick="toggleAlarm(this)">
<div class="w-6 h-6 bg-white rounded-full shadow-sm translate-x-6 transition-transform duration-300"></div>
</button>
</div>
<div class="space-y-4">
<p class="font-label-lg text-on-surface-variant">알림 소리 선택</p>
<div class="grid grid-cols-1 gap-2">
<button class="flex items-center justify-between px-4 py-3 bg-primary-container/10 border-2 border-primary-container rounded-xl text-on-primary-container">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined">elderly</span>
<span class="font-label-lg">어르신 (크고 천천히)</span>
</div>
<span class="material-symbols-outlined text-primary">check_circle</span>
</button>
<button class="flex items-center justify-between px-4 py-3 bg-surface-container border border-outline-variant/30 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label-lg">일반 (표준)</span>
</div>
</button>
<button class="flex items-center justify-between px-4 py-3 bg-surface-container border border-outline-variant/30 rounded-xl text-on-surface-variant hover:bg-surface-container-high transition-colors">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined">child_care</span>
<span class="font-label-lg">어린이 (멜로디)</span>
</div>
</button>
</div>
</div>
</div>
<!-- Alarm Card 2 -->
<div class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-6 transition-all active:scale-[0.98]">
<div class="flex justify-between items-start mb-6 opacity-60 transition-opacity duration-300" id="alarm-2-header">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">medication</span>
<span class="font-label-xl text-on-surface">종합 비타민</span>
</div>
<div class="font-headline-xl text-headline-xl text-on-surface-variant tracking-tight">12:30 <span class="text-headline-md font-medium">PM</span></div>
</div>
<button class="w-14 h-8 bg-outline-variant rounded-full relative p-1 transition-colors duration-300" onclick="toggleAlarm(this, 'alarm-2-header')">
<div class="w-6 h-6 bg-white rounded-full shadow-sm translate-x-0 transition-transform duration-300"></div>
</button>
</div>
<div class="space-y-4 opacity-60 transition-opacity duration-300" id="alarm-2-options">
<p class="font-label-lg text-on-surface-variant">알림 소리 선택</p>
<div class="flex flex-wrap gap-2">
<button class="flex-1 min-w-[100px] flex flex-col items-center gap-2 p-3 bg-surface-container border border-outline-variant/30 rounded-xl text-on-surface-variant">
<span class="material-symbols-outlined">child_care</span>
<span class="text-[12px] font-bold text-center">어린이<br/>(멜로디)</span>
</button>
<button class="flex-1 min-w-[100px] flex flex-col items-center gap-2 p-3 bg-secondary-container/20 border-2 border-secondary rounded-xl text-on-secondary-container">
<span class="material-symbols-outlined">notifications</span>
<span class="text-[12px] font-bold text-center">일반<br/>(표준)</span>
</button>
<button class="flex-1 min-w-[100px] flex flex-col items-center gap-2 p-3 bg-surface-container border border-outline-variant/30 rounded-xl text-on-surface-variant">
<span class="material-symbols-outlined">elderly</span>
<span class="text-[12px] font-bold text-center">어르신<br/>(크고 천천히)</span>
</button>
</div>
</div>
</div>
<!-- Alarm Card 3 (Evening) -->
<div class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl p-6 alarm-card-glow transition-all active:scale-[0.98]">
<div class="flex justify-between items-start mb-6">
<div>
<div class="flex items-center gap-2 mb-1">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">nightlight</span>
<span class="font-label-xl text-on-surface">수면 보조제</span>
</div>
<div class="font-headline-xl text-headline-xl text-primary tracking-tight">10:00 <span class="text-headline-md font-medium">PM</span></div>
</div>
<button class="w-14 h-8 bg-primary rounded-full relative p-1 transition-colors duration-300" onclick="toggleAlarm(this)">
<div class="w-6 h-6 bg-white rounded-full shadow-sm translate-x-6 transition-transform duration-300"></div>
</button>
</div>
<div class="flex items-center gap-3 p-4 bg-tertiary/5 rounded-xl border border-tertiary/10">
<span class="material-symbols-outlined text-tertiary">volume_up</span>
<div>
<div class="font-label-lg text-tertiary">일반 (표준)</div>
<div class="text-[12px] text-on-surface-variant">취침 전 부드러운 벨소리</div>
</div>
</div>
</div>
</div>
<!-- FAB for New Alarm -->
<button class="fixed right-6 bottom-24 w-14 h-14 bg-primary text-on-primary rounded-full shadow-lg flex items-center justify-center active:scale-90 transition-transform duration-150 z-40">
<span class="material-symbols-outlined text-[32px]">add</span>
</button>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe bg-surface-container-low h-[80px] z-50 border-t border-outline-variant/20 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant hover:bg-surface-container-high transition-colors rounded-full px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-lg text-label-lg-mobile">홈</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant hover:bg-surface-container-high transition-colors rounded-full px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="document_scanner">document_scanner</span>
<span class="font-label-lg text-label-lg-mobile">스캔</span>
</a>
<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-6 py-1 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="notifications" style="font-variation-settings: 'FILL' 1;">notifications</span>
<span class="font-label-lg text-label-lg-mobile">알람</span>
</a>
<a class="flex flex-col items-center justify-center text-on-secondary-fixed-variant hover:bg-surface-container-high transition-colors rounded-full px-4 py-1" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-lg text-label-lg-mobile">설정</span>
</a>
</nav>
<script>
        function toggleAlarm(btn, targetId) {
            const circle = btn.querySelector('div');
            const isOff = circle.classList.contains('translate-x-0');
            
            if (isOff) {
                circle.classList.remove('translate-x-0');
                circle.classList.add('translate-x-6');
                btn.classList.remove('bg-outline-variant');
                btn.classList.add('bg-primary');
                
                if (targetId) {
                    document.getElementById(targetId).classList.remove('opacity-60');
                    document.getElementById(targetId.replace('header', 'options')).classList.remove('opacity-60');
                } else {
                    btn.closest('.bg-surface-container-lowest').querySelectorAll('.opacity-60').forEach(el => el.classList.remove('opacity-60'));
                }
            } else {
                circle.classList.remove('translate-x-6');
                circle.classList.add('translate-x-0');
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-outline-variant');

                if (targetId) {
                    document.getElementById(targetId).classList.add('opacity-60');
                    document.getElementById(targetId.replace('header', 'options')).classList.add('opacity-60');
                } else {
                    // For demo, if no ID we just fade out sibling content
                    btn.parentElement.classList.add('opacity-60');
                    const options = btn.closest('.bg-surface-container-lowest').querySelector('.space-y-4, .flex-items-center');
                    if(options) options.classList.add('opacity-60');
                }
            }
        }
    </script>
</body></html>
