<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanner-line {
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0% { top: 10%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 90%; opacity: 0; }
        }
        .result-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .pill-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>

<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col overflow-x-hidden">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-surface border-b border-outline-variant/30 shadow-sm flex justify-between items-center px-margin-mobile h-touch-target-min">
<div class="flex items-center gap-2">

</div>
<div class="text-primary font-label-lg text-label-lg-mobile">

        </div>
</header>
<!-- Main Canvas -->
<main class="flex-grow pt-touch-target-min pb-[100px]">

</div>
<!-- Scanner Effects -->

<div class="w-64 h-64 border-2 border-primary-container/60 rounded-3xl relative">
<div class="scanner-line absolute left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container to-transparent blur-sm"></div>
<!-- Corner Accents -->
<div class="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-primary-container rounded-tl-xl"></div>
<div class="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-primary-container rounded-tr-xl"></div>
<div class="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-primary-container rounded-bl-xl"></div>
<div class="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-primary-container rounded-br-xl"></div>
</div>
</div>
<!-- Close/Back Button -->
<button class="absolute top-4 left-4 p-3 bg-surface-container/20 backdrop-blur-md text-white rounded-full active:scale-95 transition-all">
<span class="material-symbols-outlined">close</span>
</button>
</section>
<!-- Result Card -->
<section class="relative -mt-12 px-margin-mobile">
<div class="result-slide-up bg-surface-container-lowest border border-outline-variant/30 rounded-[32px] shadow-[0_12px_40px_rgba(0,0,0,0.1)] p-6 md:max-w-xl md:mx-auto">
<!-- Pill Identity -->
<div class="flex items-center gap-6 mb-8">
<div class="relative w-24 h-24 bg-surface-container-low rounded-full flex items-center justify-center p-2 border border-outline-variant/20 pill-float">

</div>

<span class="material-symbols-outlined">settings</span>

<script>
        // Simple haptic feedback simulation
        document.querySelectorAll('button, a').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(10);
                }
            });
        });

        // Theme toggle logic (placeholder)
        const applyTheme = (isDark) => {
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
    </script>
</body></html>
